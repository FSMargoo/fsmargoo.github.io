<!DOCTYPE html>
<html lang="en">

<head>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:100,300,400,500,700,900">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张佳琪.我爱你</title>
	<audio id="audio" src="./asset/audio/bgm.mp3"  preload="auto" controls loop hidden="true"/>  
		Your browser does not support the audio element.
	</audio>
	<script>
		var myAuto = document.getElementById('audio');  
                    myAuto.play();  
	</script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffb3d1;
        }

        .box {
            width: 120px;
            height: 120px;
            background: #D01760;
            margin: 200px auto;
            margin-bottom: 80px;
            /* 盒子旋转45度 */
            transform: rotate(45deg) scale(0.9);
            /* 绑定动画 */
            animation: change 1s infinite;
            box-shadow: 0 0 30px 5px rgba(255, 85, 157, 0.7);
        }

        .box::after,
        .box::before {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background: #D01760;
            border-radius: 50%;
            box-shadow: 0 0 30px 5px rgba(255, 85, 157, 0.7);
        }

        .box::after {
            left: -68px;
        }

        .box::before {
            top: -68px;
        }

        /* 创建动画 */
        @keyframes change {
            0% {
                transform: rotate(45deg) scale(0.85);
            }

            50% {
                transform: rotate(45deg) scale(1);
            }

            100% {
                transform: rotate(45deg) scale(0.85);
            }
        }

        p {
			font-family: "Noto Sans SC";
            text-align: center;
            font-size: 30px;
            font-weight: 120;
            color: #D01760;
            /* 文字阴影 */
            text-shadow: 0 0 90px rgba(255, 137, 187, 0.5);
        }
    </style>
</head>

<body>
    <div class="box"></div>
    <p>Jacky 我爱你~<br>迎面总来的你让我如此蠢蠢欲动<br>这种感觉我从未有<br>Cause I GOT A CRUSH ON YOU!<br>虎妞<br>你是我的，我是，你的谁？<br>请你接受我的告白与我交往！</p>
</body>

</html>
